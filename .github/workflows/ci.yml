name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ic_platform
          POSTGRES_PASSWORD: ic_platform
          POSTGRES_DB: ic_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ic_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://ic_platform:ic_platform@localhost:5432/ic_platform_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v
